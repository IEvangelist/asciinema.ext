<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <filter id="bubble-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- asciinema play-triangle mark -->
  <svg x="0" y="0" width="256" height="256" viewBox="-130 -130 1126 1126">
    <defs>
      <mask id="small-triangle-mask">
        <rect width="100%" height="100%" fill="white"/>
        <polygon points="508.0127018922194 433.0127018922194, 208.01270189221938 259.80762113533156, 208.01270189221938 606.217782649107" fill="black"/>
      </mask>
    </defs>
    <polygon points="808.0127018922194 433.01270189221935, 58.01270189221947 0, 58.01270189221913 866.0254037844386" mask="url(#small-triangle-mask)" fill="#d40000"/>
    <polyline points="481.2177826491071 333.0127018922194, 134.80762113533166 533.0127018922194" stroke="#d40000" stroke-width="90" fill="none"/>
  </svg>

  <!-- flat dark chip with .casts + blinking cursor -->
  <g filter="url(#bubble-shadow)">
    <rect x="52" y="198" width="152" height="46" rx="16" ry="16"
          fill="#111111" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
    <!-- text + cursor as one centered group; text left-anchored so cursor sits right after -->
    <g transform="translate(80, 0)">
      <text x="0" y="230"
            font-family="Consolas, 'SF Mono', 'Courier New', monospace"
            font-size="26" font-weight="700" fill="#ffffff"
            textLength="88" lengthAdjust="spacingAndGlyphs">.casts</text>
      <rect x="92" y="211" width="3" height="22" fill="#ffffff">
        <animate attributeName="opacity"
                 values="1;1;0;0"
                 keyTimes="0;0.5;0.5;1"
                 dur="1.1s"
                 repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
