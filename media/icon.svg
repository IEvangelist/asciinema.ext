  <rect x="0" y="0" width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Open cardboard box (artifact) -->
  <!-- Back flap -->
  <path d="M 28 50 L 64 36 L 100 50 L 100 56 L 64 42 L 28 56 Z" fill="#8a5a2b" opacity="0.9"/>
